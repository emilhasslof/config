
[font]
normal = { family = "AdwaitaMono Nerd Font", style = "Regular" }
bold = { family = "AdwaitaMono Nerd Font", style = "Bold" }
italic = { family = "AdwaitaMono Nerd Font", style = "Italic" }
bold_italic = { family = "AdwaitaMono Nerd Font", style = "Bold Italic" }
size = 16

[window]
dimensions = { columns = 140, lines = 45 }
position = { x = 94, y = 30 }
decorations = "buttonless"
padding = { x = 8, y = 8 }
dynamic_padding = true
opacity = 1 

[general]
import = [
    "~/.config/alacritty/themes/themes/nord.toml"
]
